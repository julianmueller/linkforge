name: "🐞 Bug Report"
description: "Tell us about a bug you found in LinkForge"
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        **Thanks for taking the time to report a bug!**

        Please fill out the form below to help us investigate. If you have any questions, feel free to ask in our [Discussions](https://github.com/arounamounchili/linkforge/discussions).
  - type: input
    id: linkforge_version
    attributes:
      label: "LinkForge Version"
      placeholder: "e.g. 1.0.0, 1.1.0-rc1"
    validations:
      required: true
  - type: input
    id: blender_version
    attributes:
      label: "Blender Version"
      placeholder: "e.g. 4.2.0"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: "Operating System"
      options:
        - Windows
        - macOS (Intel)
        - macOS (Apple Silicon)
        - Linux
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: "Description"
      description: "A clear and concise description of the bug."
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: "Steps to Reproduce"
      description: "Steps to reproduce the behavior."
      placeholder: |
        1. Open Blender
        2. Go to '...'
        3. Click on '...'
        4. See error
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: "Logs / Screenshots"
      description: "Please attach any relevant screenshots or logs from the Blender console (Window > Toggle System Console)."
    validations:
      required: false
