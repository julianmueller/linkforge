name: Blender Tests

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  blender-tests:
    name: Blender Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.11"
          enable-cache: true

      - name: Install dependencies
        run: |
          uv sync --all-groups --all-extras

      - name: Setup Blender
        uses: ./.github/actions/setup-blender
        with:
          version: '4.2.0'
          headless: 'true'

      - name: Run Blender Tests
        run: |
          export BLENDER_PATH=$(pwd)/blender/blender
          xvfb-run python blender_launcher.py
