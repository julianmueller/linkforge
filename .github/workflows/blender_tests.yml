name: Blender Tests

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  blender-tests:
    name: Blender Unit Tests (Blender ${{ matrix.blender-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - blender-version: '4.2.0'
            python-version: '3.11'
          - blender-version: '4.5.8'
            python-version: '3.11'
          - blender-version: '5.1.0'
            python-version: '3.13'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install dependencies
        run: |
          uv sync --all-groups --all-extras

      - name: Setup Blender
        uses: ./.github/actions/setup-blender
        with:
          version: ${{ matrix.blender-version }}
          python-version: ${{ matrix.python-version }}
          headless: 'true'

      - name: Run Blender Tests
        run: |
          BLENDER_PATH="$(pwd)/blender/blender"
          export BLENDER_PATH
          xvfb-run python blender_launcher.py
