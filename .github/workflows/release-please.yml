name: release-please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Checkout code
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/checkout@v6

      - name: Install uv
        if: ${{ steps.release.outputs.release_created }}
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies
        if: ${{ steps.release.outputs.release_created }}
        run: |
          uv venv
          uv pip install -e .

      - name: Setup Blender (Manual)
        if: ${{ steps.release.outputs.release_created }}
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxxf86vm-dev libxcursor-dev libxi-dev libxrandr-dev libxinerama-dev libglew-dev
          echo "Downloading Blender 4.2.0..."
          wget -q https://download.blender.org/release/Blender4.2/blender-4.2.0-linux-x64.tar.xz
          mkdir -p blender
          tar -xf blender-4.2.0-linux-x64.tar.xz -C blender --strip-components=1
          echo "$(pwd)/blender" >> $GITHUB_PATH
          blender --version

      - name: Build extension
        if: ${{ steps.release.outputs.release_created }}
        run: uv run python build_extension.py

      - name: Upload Release Artifact
        if: ${{ steps.release.outputs.release_created }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ steps.release.outputs.tag_name }} dist/*.zip
