[project]
name = "linkforge-blender"
version = "1.2.1" # x-release-please-version
description = "LinkForge Blender Extension"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "linkforge-core",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["linkforge"]

[tool.uv.sources]
linkforge-core = { workspace = true }
